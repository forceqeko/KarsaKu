name: Build KarsaKu Android APK

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle 8.10.2
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.10.2'

      - name: Build Debug APK
        run: |
          gradle assembleDebug --stacktrace --no-daemon > build_log.txt 2>&1 || (echo "=== BUILD LOG ERROR TAIL ===" && tail -n 150 build_log.txt && exit 1)

      - name: Upload Debug APK Artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: KarsaKu-app-debug
          path: app/build/outputs/apk/debug/app-debug.apk

      - name: Upload Build Log on Failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-failure-log
          path: build_log.txt
